<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — الصفحة غير موجودة | NEW MEDIA</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050505;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(102,0,204,0.3) 0%, transparent 70%);
    top: -150px; right: -150px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,102,0,0.2) 0%, transparent 70%);
    bottom: -100px; left: -100px;
  }
  .num {
    font-family: 'Alexandria', sans-serif;
    font-weight: 900;
    font-size: clamp(100px, 20vw, 180px);
    line-height: 1;
    background: linear-gradient(135deg, #6600cc, #cc3366, #ff6600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
  }
  .title {
    font-family: 'Alexandria', sans-serif;
    font-weight: 900;
    font-size: clamp(22px, 4vw, 36px);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 1.5rem 0 1rem;
    position: relative;
    z-index: 1;
  }
  .sub {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    max-width: 400px;
    line-height: 1.8;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }
  .btn {
    font-family: 'Alexandria', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    background: linear-gradient(135deg, #6600cc, #ff6600);
    padding: 14px 32px;
    border-radius: 12px;
    transition: opacity 0.3s, transform 0.2s;
    position: relative;
    z-index: 1;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="num">404</div>
  <h1 class="title">الصفحة غير موجودة</h1>
  <p class="sub">يبدو أن هذه الصفحة لا وجود لها. ربما تم نقلها أو حذفها.</p>
  <a href="/" class="btn">العودة للرئيسية</a>
</body>
</html>
