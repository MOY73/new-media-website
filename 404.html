<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="color-scheme" content="dark light">
<title>404 — الصفحة غير موجودة | NEW MEDIA</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050505;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(102,0,204,0.3) 0%, transparent 70%);
    top: -150px; right: -150px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,102,0,0.2) 0%, transparent 70%);
    bottom: -100px; left: -100px;
  }
  .num {
    font-family: 'Alexandria', sans-serif;
    font-weight: 900;
    font-size: clamp(100px, 20vw, 180px);
    line-height: 1;
    background: linear-gradient(135deg, #6600cc, #cc3366, #ff6600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
  }
  .title {
    font-family: 'Alexandria', sans-serif;
    font-weight: 900;
    font-size: clamp(22px, 4vw, 36px);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 1.5rem 0 1rem;
    position: relative;
    z-index: 1;
  }
  .sub {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    max-width: 400px;
    line-height: 1.8;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }
  .btn {
    font-family: 'Alexandria', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    background: linear-gradient(135deg, #6600cc, #ff6600);
    padding: 14px 32px;
    border-radius: 12px;
    transition: opacity 0.3s, transform 0.2s;
    position: relative;
    z-index: 1;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-2px); }
  .theme-btn-404 { position:fixed; top:1.25rem; left:1.25rem; font-size:15px; color:rgba(255,255,255,.65); background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.14); width:34px; height:34px; border-radius:8px; cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center; z-index:100; }
  .theme-btn-404:hover { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.28); }
  html.light body { background:#f5f5f7; color:#0d0d0d; }
  html.light .sub { color:rgba(0,0,0,.45); }
  html.light .orb-1 { background:radial-gradient(circle,rgba(102,0,204,.18),transparent 70%); }
  html.light .orb-2 { background:radial-gradient(circle,rgba(255,102,0,.14),transparent 70%); }
  html.light .theme-btn-404 { color:rgba(0,0,0,.6); background:rgba(0,0,0,.05); border-color:rgba(0,0,0,.13); }
  html.light .theme-btn-404:hover { background:rgba(0,0,0,.1); color:#0d0d0d; border-color:rgba(0,0,0,.25); }
</style>
</head>
<body>
  <button class="theme-btn-404" id="themeBtn" aria-label="Toggle theme" title="Dark / Light">☽</button>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="num">404</div>
  <h1 class="title">الصفحة غير موجودة</h1>
  <p class="sub">يبدو أن هذه الصفحة لا وجود لها. ربما تم نقلها أو حذفها.</p>
  <a href="/" class="btn">العودة للرئيسية</a>
<script>
  const themeBtn=document.getElementById('themeBtn');
  function applyTheme(t){if(t==='light'){document.documentElement.classList.add('light');themeBtn.textContent='☀';}else{document.documentElement.classList.remove('light');themeBtn.textContent='☽';}localStorage.setItem('nm-theme',t);}
  applyTheme(localStorage.getItem('nm-theme')||'dark');
  themeBtn.addEventListener('click',()=>applyTheme(document.documentElement.classList.contains('light')?'dark':'light'));
</script>
</body>
</html>
